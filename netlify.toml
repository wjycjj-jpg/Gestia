[build]
  command = "npx expo export --platform web"
  publish = "dist"

[[headers]]
  for = "*.ttf"
  [headers.values]
    Content-Type = "font/ttf"

[[headers]]
  for = "*.woff"
  [headers.values]
    Content-Type = "font/woff"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Content-Type = "font/woff2"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
